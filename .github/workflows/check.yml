name: Design Compliance

on: [push, pull_request]

jobs:
  design-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run check:contrast
      - run: npm run check:tokens
      - run: npm run lint:css
      - run: npm run lint:js
      - run: npx astro check
